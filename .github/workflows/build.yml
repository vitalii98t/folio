name: Build Folio

# Runs on every push to main and on version tags (v1.2.3).
# Pushing a tag publishes a GitHub Release with all built artifacts attached.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app bundle
        run: npm run build

      - name: Regenerate icons
        run: npm run icons

      # Package per platform — never publish here; the dedicated `release` job
      # below uploads everything once builds are done.
      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --x64 --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Upload artifacts to the workflow run so you can download them manually
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            release/*.exe
            release/*.exe.blockmap
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload macOS Intel artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            release/*.dmg
            !release/*-arm64.dmg
          if-no-files-found: error

      - name: Upload macOS Apple Silicon artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/*-arm64.dmg
          if-no-files-found: error

  # On tag push — collect everything and create a GitHub Release
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
